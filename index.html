<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioLab Quest — 8-Bit Microbiology Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; background: #060c18; overflow: hidden; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a1020; }
    ::-webkit-scrollbar-thumb { background: #3a4a6a; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

/*
 * ╔══════════════════════════════════════════════════════════════╗
 * ║  BIOLAB QUEST — 8-Bit Microbiology Education Game           ║
 * ║  Architecture: Each level is a config object in LEVELS[].   ║
 * ║  To add a level: push a new object with the same shape.     ║
 * ╚══════════════════════════════════════════════════════════════╝
 */


// ═══════════════════════════════════════════════════════════════
// SECTION 1: LEVEL CONFIGURATION
// ═══════════════════════════════════════════════════════════════
const LEVELS = [
  {
    id: 1,
    name: "Gram Stain",
    year: 1884,
    scientist: "Hans Christian Gram",
    description: "In 1884, Danish bacteriologist Hans Christian Gram was trying to stain lung tissue to visualize bacteria in patients with pneumonia. He discovered that certain bacteria retained a crystal violet-iodine complex even after washing with alcohol, while others did not.\n\nThis accident became one of the most important techniques in microbiology. The difference comes down to cell wall structure: Gram-positive bacteria have a thick peptidoglycan layer that traps the dye, while Gram-negative bacteria have a thin peptidoglycan layer and an outer membrane that lets the dye wash away.\n\nYour task: perform the four-step Gram stain protocol in the correct order — crystal violet, iodine mordant, alcohol decolorizer, then safranin counterstain.",
    background: "#0a1628",
    accentColor: "#7b2ff7",
    requiredEquipment: [
      { id: "microscope", name: "Microscope", cost: 800, icon: "🔬", broken: true, repairCost: 200, repairGame: "lens_align" },
      { id: "burner", name: "Bunsen Burner", cost: 300, icon: "🔥", broken: true, repairCost: 150, repairGame: "pipe_connect" },
      { id: "slides", name: "Slide Kit", cost: 150, icon: "🔲", broken: false, repairCost: 100, repairGame: "calibrate" },
    ],
    reagents: [
      { id: "crystal_violet", name: "Crystal Violet", cost: 50, icon: "💜", color: "#9b59b6", desc: "A purple triarylmethane dye. The primary stain in the Gram stain — it penetrates the cell wall of all bacteria." },
      { id: "iodine", name: "Iodine Solution", cost: 40, icon: "🟤", color: "#8B4513", desc: "Gram's iodine acts as a mordant, forming a crystal violet-iodine complex that becomes trapped in thick peptidoglycan." },
      { id: "decolorizer", name: "Decolorizer", cost: 35, icon: "💧", color: "#87CEEB", desc: "Ethanol or acetone washes out the dye from thin-walled Gram-negative bacteria while Gram-positive cells retain it." },
      { id: "safranin", name: "Safranin", cost: 45, icon: "🔴", color: "#e74c3c", desc: "A red counterstain that colors the now-decolorized Gram-negative bacteria pink/red, making them visible." },
      { id: "methylene_blue", name: "Methylene Blue", cost: 55, icon: "🔵", color: "#2980b9", desc: "A basic thiazine dye used in simple staining and Loeffler's methylene blue technique. Not part of the Gram stain." },
      { id: "malachite_green", name: "Malachite Green", cost: 60, icon: "🟢", color: "#27ae60", desc: "The primary stain in the Schaeffer-Fulton endospore stain. Requires heat to penetrate endospore walls." },
      { id: "acid_alcohol", name: "Acid-Alcohol", cost: 45, icon: "⚗️", color: "#e67e22", desc: "A decolorizer used in the Ziehl-Neelsen acid-fast stain for Mycobacterium. Not used in Gram staining." },
      { id: "carbol_fuchsin", name: "Carbol Fuchsin", cost: 65, icon: "🩷", color: "#d63384", desc: "A red dye used as the primary stain in the acid-fast (Ziehl-Neelsen) technique for tuberculosis diagnosis." },
      { id: "nigrosin", name: "Nigrosin", cost: 40, icon: "⚫", color: "#2c2c3e", desc: "A negative stain — it colors the background, not the cells. Used to visualize bacterial capsules." },
      { id: "congo_red", name: "Congo Red", cost: 50, icon: "🟥", color: "#c0392b", desc: "A diazo dye used in capsule staining and amyloid detection. Not part of the Gram stain procedure." },
    ],
    // Only these 4 are needed — the rest are distractors
    requiredReagents: ["crystal_violet", "iodine", "decolorizer", "safranin"],
    correctSequence: ["crystal_violet", "iodine", "decolorizer", "safranin"],
    grantReward: 600,
    xpReward: 120,
    completionFact: "Gram-positive bacteria retain crystal violet (appear purple) due to their thick peptidoglycan layer. Gram-negative bacteria lose the violet during decolorization and pick up safranin (appear pink/red). This 140-year-old technique remains one of the first steps in bacterial identification.",
  },
];

// ═══════════════════════════════════════════════════════════════
// SECTION 2: STAFF DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const STAFF_TYPES = [
  { id: "undergrad", name: "Undergrad", cost: 100, wage: 20, speed: 1, icon: "🎒", desc: "Cheap but slow.", hairColor: "#f4d03f" },
  { id: "phd", name: "PhD Student", cost: 300, wage: 60, speed: 2, icon: "📚", desc: "Good cost & skill balance.", hairColor: "#8B4513" },
  { id: "postdoc", name: "Post-Doc", cost: 500, wage: 120, speed: 3, icon: "🧪", desc: "Fast and reliable.", hairColor: "#2c3e50" },
  { id: "labtech", name: "Lab Tech", cost: 400, wage: 80, speed: 2.5, icon: "🔧", desc: "Cheaper repairs.", hairColor: "#e74c3c" },
];

// ═══════════════════════════════════════════════════════════════
// SECTION 3: PIXEL ART LAB SCENE (SVG)
// ═══════════════════════════════════════════════════════════════

function PixelPerson({ startX, hairColor, phase }) {
  const [posX, setPosX] = useState(startX);
  const [dir, setDir] = useState(1);
  const [step, setStep] = useState(0);
  const dirRef = useRef(dir);
  dirRef.current = dir;

  useEffect(() => {
    const speed = 200 + phase * 70;
    const i = setInterval(() => {
      setStep(s => (s + 1) % 4);
      setPosX(px => {
        const d = dirRef.current;
        const next = px + d * 2;
        if (next > startX + 50 || next < startX - 50) {
          const nd = -d;
          dirRef.current = nd;
          setDir(nd);
          return px + nd * 2;
        }
        return next;
      });
    }, speed);
    return () => clearInterval(i);
  }, [startX, phase]);

  const legOff = step % 2;
  const scaleX = dir < 0 ? -1 : 1;

  // Person is ~50 units tall, positioned so feet are near y=180 (floor)
  return (
    <g transform={`translate(${posX}, 100)`}>
      <g transform={`scale(${scaleX},1)`} style={{ transformOrigin: "10px 0px" }}>
        {/* Hair */}
        <rect x="2" y="0" width="16" height="6" fill={hairColor} />
        {/* Head */}
        <rect x="2" y="4" width="16" height="12" fill="#fdd8b5" />
        {/* Eyes */}
        <rect x="5" y="9" width="3" height="2" fill="#1a1a2e" />
        <rect x="12" y="9" width="3" height="2" fill="#1a1a2e" />
        {/* Mouth */}
        <rect x="8" y="13" width="4" height="1" fill="#d4a88c" />
        {/* Lab coat body */}
        <rect x="0" y="16" width="20" height="20" fill="#eef2f5" />
        <rect x="8" y="16" width="4" height="20" fill="#dde4ea" />
        {/* Coat collar */}
        <rect x="3" y="16" width="5" height="3" fill="#dde4ea" />
        <rect x="12" y="16" width="5" height="3" fill="#dde4ea" />
        {/* Pocket with pen */}
        <rect x="13" y="22" width="5" height="4" fill="#dde4ea" />
        <rect x="14" y="22" width="2" height="3" fill="#3498db" />
        {/* Arms */}
        <rect x="-4" y="18" width="4" height="12" fill="#eef2f5" />
        <rect x="20" y="18" width="4" height="12" fill="#eef2f5" />
        {/* Hands */}
        <rect x="-4" y="30" width="4" height="4" fill="#fdd8b5" />
        <rect x="20" y="30" width="4" height="4" fill="#fdd8b5" />
        {/* Legs - animated */}
        <rect x="3" y="36" width="6" height={8 + legOff * 2} fill="#2c3e50" />
        <rect x="11" y="36" width="6" height={8 - legOff * 2 + 2} fill="#2c3e50" />
        {/* Shoes */}
        <rect x="1" y={44 + legOff * 2} width="8" height="4" fill="#1a1a2e" />
        <rect x="11" y={46 - legOff * 2} width="8" height="4" fill="#1a1a2e" />
      </g>
    </g>
  );
}

function LabBench({ x, w = 120 }) {
  return (
    <g>
      {/* Bench top surface */}
      <rect x={x} y="128" width={w} height="6" fill="#8B6914" />
      <rect x={x} y="134" width={w} height="4" fill="#6d4c2a" />
      {/* Legs */}
      <rect x={x + 6} y="138" width="6" height="36" fill="#5a3a1a" />
      <rect x={x + w - 12} y="138" width="6" height="36" fill="#5a3a1a" />
      {/* Under-shelf */}
      <rect x={x + 4} y="158" width={w - 8} height="4" fill="#4a2a0a" />
    </g>
  );
}

function SvgMicroscope({ x, broken }) {
  return (
    <g transform={`translate(${x}, 80)`}>
      <rect x="8" y="0" width="10" height="5" fill={broken ? "#555" : "#8ec8f0"} />
      <rect x="10" y="5" width="6" height="22" fill={broken ? "#444" : "#5a7fa5"} />
      <rect x="6" y="14" width="5" height="5" fill={broken ? "#444" : "#5a7fa5"} />
      <rect x="16" y="10" width="7" height="3" fill={broken ? "#444" : "#8ec8f0"} />
      <rect x="3" y="27" width="20" height="6" fill={broken ? "#333" : "#3d4f6f"} />
      <rect x="6" y="33" width="14" height="5" fill={broken ? "#2a2a2a" : "#2a3a5c"} />
      <rect x="3" y="38" width="20" height="6" fill={broken ? "#222" : "#1e2d4a"} />
      {broken && <>
        <line x1="4" y1="4" x2="22" y2="38" stroke="#e85555" strokeWidth="2.5" />
        <line x1="22" y1="4" x2="4" y2="38" stroke="#e85555" strokeWidth="2.5" />
      </>}
    </g>
  );
}

function SvgBurner({ x }) {
  return (
    <g transform={`translate(${x}, 90)`}>
      <rect x="6" y="14" width="14" height="22" fill="#777" />
      <rect x="4" y="10" width="18" height="5" fill="#999" />
      <rect x="3" y="34" width="20" height="4" fill="#666" />
      {/* Flame */}
      <rect x="9" y="0" width="8" height="10" fill="#4a9ef5" opacity="0.7" />
      <rect x="11" y="-5" width="4" height="7" fill="#f5c842" opacity="0.8" />
      <rect x="11" y="-8" width="4" height="4" fill="#f59842" opacity="0.4" />
    </g>
  );
}

function SvgSlides({ x }) {
  return (
    <g transform={`translate(${x}, 108)`}>
      <rect x="0" y="0" width="32" height="18" fill="#2a2a3e" />
      <rect x="2" y="2" width="8" height="14" fill="#aabbcc" opacity="0.3" />
      <rect x="11" y="2" width="8" height="14" fill="#aabbcc" opacity="0.25" />
      <rect x="21" y="2" width="8" height="14" fill="#aabbcc" opacity="0.2" />
    </g>
  );
}

function SvgReagentBottle({ x, y = 0, color }) {
  return (
    <g transform={`translate(${x}, ${y})`}>
      <rect x="4" y="0" width="8" height="4" fill="#bbb" />
      <rect x="2" y="4" width="12" height="16" fill={color} opacity="0.85" />
      <rect x="4" y="6" width="4" height="3" fill="#fff" opacity="0.25" />
      <rect x="2" y="19" width="12" height="3" fill={color} opacity="0.95" />
    </g>
  );
}

function LabScene({ ownedEquipment, brokenEquipment, ownedReagents, staff, level }) {
  const staffPositions = useMemo(() => {
    return staff.map((s, i) => ({
      ...s,
      startX: 30 + (i * 70) % 320,
      hairColor: STAFF_TYPES.find(t => t.id === s.id)?.hairColor || "#8B4513",
    }));
  }, [staff]);

  return (
    <div style={{
      background: "linear-gradient(180deg, #0d1a30 0%, #0a1222 100%)",
      borderTop: "2px solid #2a3a5a",
      flexShrink: 0,
      overflow: "hidden",
    }}>
      <svg viewBox="0 0 400 195" width="100%" height="155" style={{ imageRendering: "pixelated", display: "block" }} preserveAspectRatio="xMidYMax meet">
        {/* Wall */}
        <rect x="0" y="0" width="400" height="175" fill="#0f1928" />
        <rect x="0" y="85" width="400" height="1" fill="#1a2a45" opacity="0.4" />

        {/* Ceiling lights */}
        <rect x="80" y="0" width="40" height="4" fill="#3a4a6a" />
        <rect x="88" y="4" width="24" height="3" fill="#f5e6a0" opacity="0.25" />
        <ellipse cx="100" cy="14" rx="50" ry="14" fill="#f5e6a0" opacity="0.025" />
        <rect x="260" y="0" width="40" height="4" fill="#3a4a6a" />
        <rect x="268" y="4" width="24" height="3" fill="#f5e6a0" opacity="0.25" />

        {/* Floor */}
        <rect x="0" y="175" width="400" height="20" fill="#1a2238" />
        <rect x="0" y="175" width="400" height="2" fill="#2a3a5a" />
        {Array.from({ length: 13 }).map((_, i) => (
          <rect key={i} x={i * 32} y="178" width="30" height="16" fill={i % 2 === 0 ? "#1e2842" : "#1a2238"} opacity="0.4" />
        ))}

        {/* Two lab benches */}
        <LabBench x={10} w={130} />
        <LabBench x={170} w={100} />

        {/* Reagent shelf on right wall — two shelves for 10 bottles */}
        {/* Top shelf */}
        <rect x="290" y="42" width="105" height="3" fill="#5a4a2a" />
        <rect x="287" y="42" width="4" height="50" fill="#4a3a1a" />
        <rect x="395" y="42" width="4" height="50" fill="#4a3a1a" />
        {/* Bottom shelf */}
        <rect x="290" y="68" width="105" height="3" fill="#5a4a2a" />
        {/* Base */}
        <rect x="290" y="90" width="105" height="3" fill="#5a4a2a" />
        <text x="342" y="38" textAnchor="middle" fontSize="5" fill="#3a5a7a" fontFamily="'Press Start 2P'">REAGENTS</text>

        {/* ── Equipment on benches ── */}
        {ownedEquipment.includes("microscope") ? (
          <SvgMicroscope x={30} broken={brokenEquipment.includes("microscope")} />
        ) : (
          <g>
            <rect x="36" y="105" width="22" height="20" fill="none" stroke="#2a3a5a" strokeWidth="0.8" strokeDasharray="3,3" />
            <text x="47" y="118" textAnchor="middle" fontSize="8" fill="#2a3a5a" fontFamily="'Press Start 2P'">?</text>
          </g>
        )}

        {ownedEquipment.includes("burner") ? (
          <SvgBurner x={85} />
        ) : (
          <g>
            <rect x="92" y="105" width="22" height="20" fill="none" stroke="#2a3a5a" strokeWidth="0.8" strokeDasharray="3,3" />
            <text x="103" y="118" textAnchor="middle" fontSize="8" fill="#2a3a5a" fontFamily="'Press Start 2P'">?</text>
          </g>
        )}

        {ownedEquipment.includes("slides") ? (
          <SvgSlides x={190} />
        ) : (
          <g>
            <rect x="196" y="110" width="26" height="16" fill="none" stroke="#2a3a5a" strokeWidth="0.8" strokeDasharray="3,3" />
            <text x="209" y="122" textAnchor="middle" fontSize="8" fill="#2a3a5a" fontFamily="'Press Start 2P'">?</text>
          </g>
        )}

        {/* ── Reagent bottles on shelves (5 per row) ── */}
        {level.reagents.map((r, i) => {
          const row = i < 5 ? 0 : 1;
          const col = i % 5;
          const rx = 294 + col * 20;
          const ry = row === 0 ? 45 : 71;
          const emptyY = row === 0 ? 47 : 73;
          if (!ownedReagents.includes(r.id)) {
            return (
              <g key={r.id}>
                <rect x={rx + 3} y={emptyY} width="12" height="16" fill="none" stroke="#2a3a5a" strokeWidth="0.5" strokeDasharray="2,2" />
              </g>
            );
          }
          return <SvgReagentBottle key={r.id} x={rx} y={ry} color={r.color} />;
        })}

        {/* ── Staff pixel people ── */}
        {staffPositions.map((s, i) => (
          <PixelPerson key={s.uid} startX={s.startX} hairColor={s.hairColor} phase={i} />
        ))}

        {staff.length === 0 && (
          <text x="200" y="155" textAnchor="middle" fontSize="6" fill="#2a3a5a" fontFamily="'Press Start 2P'">
            HIRE STAFF TO POPULATE LAB
          </text>
        )}
      </svg>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SECTION 4: UI SUBCOMPONENTS
// ═══════════════════════════════════════════════════════════════

function PxButton({ children, onClick, disabled, variant = "primary", style = {} }) {
  const cols = {
    primary: { bg: "#2a6e2a", bd: "#1a4e1a", hv: "#3a8e3a", tx: "#d0ffd0" },
    danger: { bg: "#6e2a2a", bd: "#4e1a1a", hv: "#8e3a3a", tx: "#ffd0d0" },
    accent: { bg: "#4a2a8e", bd: "#3a1a6e", hv: "#6a3aae", tx: "#e0d0ff" },
    shop: { bg: "#8e6e1a", bd: "#6e4e0a", hv: "#ae8e2a", tx: "#fff4d0" },
    neutral: { bg: "#3a3a4a", bd: "#2a2a3a", hv: "#5a5a6a", tx: "#d0d0e0" },
  };
  const c = cols[variant] || cols.primary;
  return (
    <button onClick={onClick} disabled={disabled}
      style={{
        fontFamily: "'Press Start 2P', monospace", fontSize: "8px", padding: "8px 14px",
        background: disabled ? "#2a2a3a" : c.bg, color: disabled ? "#555" : c.tx,
        border: `2px solid ${disabled ? "#333" : c.bd}`, borderBottom: `4px solid ${disabled ? "#222" : c.bd}`,
        cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.1s", ...style,
      }}
      onMouseEnter={e => { if (!disabled) e.target.style.background = c.hv; }}
      onMouseLeave={e => { if (!disabled) e.target.style.background = disabled ? "#2a2a3a" : c.bg; }}
    >{children}</button>
  );
}

function PxPanel({ title, children, color = "#1a2a4a", style = {} }) {
  return (
    <div style={{ background: color, border: "2px solid #3a4a6a", ...style }}>
      {title && <div style={{ background: "#3a4a6a", padding: "6px 10px", fontFamily: "'Press Start 2P'", fontSize: "8px", color: "#8ec8f0", letterSpacing: "1px" }}>{title}</div>}
      <div style={{ padding: "10px" }}>{children}</div>
    </div>
  );
}

function ResourceBar({ label, current, max, color, icon }) {
  const pct = Math.min(100, Math.max(0, (current / max) * 100));
  return (
    <div style={{ marginBottom: "4px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "2px" }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "7px", color: "#8ec8f0" }}>{icon} {label}</span>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "7px", color }}>${current.toLocaleString()}</span>
      </div>
      <div style={{ background: "#0a1020", height: "8px", border: "1px solid #3a4a6a" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, transition: "width 0.5s" }} />
      </div>
    </div>
  );
}

function Scanlines() {
  return <div style={{ position: "absolute", inset: 0, background: "repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px)", pointerEvents: "none", zIndex: 100 }} />;
}

function BlinkCursor() {
  const [on, setOn] = useState(true);
  useEffect(() => { const i = setInterval(() => setOn(v => !v), 530); return () => clearInterval(i); }, []);
  return <span style={{ opacity: on ? 1 : 0 }}>█</span>;
}

// ═══════════════════════════════════════════════════════════════
// SECTION 5: GAME SCREENS
// ═══════════════════════════════════════════════════════════════

function TitleScreen({ onStart }) {
  const [blink, setBlink] = useState(true);
  useEffect(() => { const i = setInterval(() => setBlink(v => !v), 600); return () => clearInterval(i); }, []);

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: "16px", textAlign: "center", padding: "20px" }}>
      <svg viewBox="0 0 20 30" width="80" height="120" style={{ imageRendering: "pixelated" }}>
        <rect x="5" y="0" width="10" height="4" fill="#8B4513" />
        <rect x="5" y="3" width="10" height="7" fill="#fdd8b5" />
        <rect x="7" y="6" width="2" height="1" fill="#1a1a2e" />
        <rect x="11" y="6" width="2" height="1" fill="#1a1a2e" />
        <rect x="3" y="10" width="14" height="12" fill="#eef2f5" />
        <rect x="8" y="10" width="4" height="12" fill="#dde4ea" />
        <rect x="12" y="13" width="3" height="3" fill="#dde4ea" />
        <rect x="12" y="13" width="2" height="2" fill="#3498db" />

// LENS ALIGNMENT — click parts in order (eyepiece → objective → stage → light source)
function LensAlignMinigame({ onComplete, onFail }) {
  const [placed, setPlaced] = useState([]);
  const [result, setResult] = useState(null);
  const [timer, setTimer] = useState(60);
  const [shaking, setShaking] = useState(false);
  const correct = ["eyepiece", "objective", "stage", "light_source"];
  const parts = useMemo(() => {
    const all = [
      { id: "eyepiece", name: "Eyepiece (Ocular)", color: "#8ec8f0", slot: 0 },
      { id: "objective", name: "Objective Lens", color: "#5a7fa5", slot: 1 },
      { id: "stage", name: "Stage", color: "#7fa5c8", slot: 2 },
      { id: "light_source", name: "Light Source", color: "#f5c842", slot: 3 },
      { id: "condenser", name: "Condenser", color: "#3d6f9f", slot: -1 },
      { id: "dust_cap", name: "Dust Cap", color: "#666", slot: -1 },
      { id: "oil_vial", name: "Immersion Oil", color: "#e8a735", slot: -1 },
    ];
    const a = [...all];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }, []);

  useEffect(() => {
    if (result) return;
    if (timer <= 0) { setResult("fail"); setTimeout(onFail, 1500); return; }
    const t = setTimeout(() => setTimer(v => v - 1), 1000);
    return () => clearTimeout(t);
  }, [timer, result, onFail]);

  const place = (id) => {
    if (result) return;
    const next = [...placed, id];
    setPlaced(next);
    if (id !== correct[placed.length]) {
      setShaking(true); setTimeout(() => setShaking(false), 400);
      setResult("fail"); setTimeout(onFail, 1500); return;
    }
    if (next.length === correct.length) { setResult("success"); setTimeout(onComplete, 1500); }
  };

  const tc = timer > 12 ? "#5ae855" : timer > 6 ? "#e8a735" : "#e85555";

  return (
    <PxPanel title="🔬 REPAIR: LENS ALIGNMENT" color="#0a0e1e">

      </p>
      <div style={{ textAlign: "center", marginBottom: "6px" }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "10px", color: tc }}>⏱ {timer}s</span>
      </div>
      {/* Microscope body with slots */}
      <div style={{ display: "flex", justifyContent: "center", marginBottom: "10px", animation: shaking ? "shake 0.3s" : undefined }}>
        <svg viewBox="0 0 60 90" width="100" height="150" style={{ imageRendering: "pixelated" }}>
          {/* Microscope frame */}
          <rect x="20" y="0" width="20" height="8" fill="#2a3a5c" />
          <rect x="18" y="8" width="24" height="70" fill="#1e2d4a" />
          <rect x="10" y="78" width="40" height="8" fill="#2a3a5c" />
          {/* Slots */}
          {[0,1,2,3].map(i => {
            const sy = 6 + i * 18;
            const filled = placed.length > i;
            const partData = filled ? parts.find(p => p.id === placed[i]) : null;
            return (
              <g key={i}>
                <rect x="22" y={sy} width="16" height="14" fill={filled ? (partData?.color || "#555") : "#0a1020"} stroke={filled ? "#fff3" : "#3a4a6a"} strokeWidth="1" rx="1" />
                {filled && <text x="30" y={sy + 9} textAnchor="middle" fontSize="4" fill="#fff" fontFamily="'Press Start 2P'">{i + 1}</text>}
                {!filled && placed.length === i && <text x="30" y={sy + 10} textAnchor="middle" fontSize="6" fill="#3a6a8a" fontFamily="'Press Start 2P'">?</text>}
              </g>
            );
          })}
        </svg>
      </div>
      <div style={{ textAlign: "center", marginBottom: "6px" }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#5a7a9a" }}>SLOT {Math.min(placed.length + 1, 4)} / 4</span>
      </div>
      {!result && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", justifyContent: "center" }}>
          {parts.map(p => (
            <PxButton key={p.id} variant="accent" disabled={placed.includes(p.id)} onClick={() => place(p.id)}
              style={{ fontSize: "6px", padding: "6px 8px", minWidth: "75px", display: "flex", alignItems: "center", gap: "3px" }}>
              <span style={{ display: "inline-block", width: "6px", height: "6px", background: p.color, border: "1px solid #fff3" }} />

// CALIBRATION — hit the target zone on a moving gauge (timing game)
function CalibrateMinigame({ onComplete, onFail }) {
  const [phase, setPhase] = useState("ready"); // ready | moving | result
  const [needlePos, setNeedlePos] = useState(0);
  const [dir, setDir] = useState(1);
  const [hits, setHits] = useState(0);
  const [result, setResult] = useState(null);
  const targetMin = 35;
  const targetMax = 55;
  const needed = 3;
  const dirRef = useRef(dir);
  dirRef.current = dir;
  const posRef = useRef(needlePos);
  posRef.current = needlePos;

  useEffect(() => {
    if (phase !== "moving") return;
    const i = setInterval(() => {
      setNeedlePos(p => {
        const speed = 2.5 + hits * 0.8; // gets faster each hit
        let next = p + dirRef.current * speed;
        if (next >= 100) { next = 100; dirRef.current = -1; setDir(-1); }
        if (next <= 0) { next = 0; dirRef.current = 1; setDir(1); }
        posRef.current = next;
        return next;
      });
    }, 30);
    return () => clearInterval(i);
  }, [phase, hits]);

  const startMoving = () => setPhase("moving");

  const tryStop = () => {
    const p = posRef.current;
    if (p >= targetMin && p <= targetMax) {
      const newHits = hits + 1;
      setHits(newHits);
      if (newHits >= needed) {
        setPhase("result");
        setResult("success");
        setTimeout(onComplete, 1500);
      } else {
        // Reset needle for next round
        setNeedlePos(0);
        dirRef.current = 1;
        setDir(1);
      }
    } else {
      setPhase("result");
      setResult("fail");
      setTimeout(onFail, 1500);
    }
  };

  return (
    <PxPanel title="🔲 REPAIR: CALIBRATE EQUIPMENT" color="#0a0e1e">
      <p style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#5a7a9a", marginBottom: "8px", lineHeight: "1.8" }}>
        Stop the needle in the green zone {needed} times. It speeds up each round!
      </p>
      <div style={{ textAlign: "center", marginBottom: "6px" }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "8px", color: "#e8a735" }}>HIT {hits} / {needed}</span>
      </div>
      {/* Gauge */}
      <div style={{ display: "flex", justifyContent: "center", marginBottom: "12px" }}>
        <svg viewBox="0 0 200 50" width="300" height="75" style={{ imageRendering: "pixelated" }}>
          {/* Background bar */}
          <rect x="10" y="15" width="180" height="20" fill="#0a1020" stroke="#3a4a6a" strokeWidth="1" />
          {/* Danger zones */}
          <rect x="10" y="15" width={180 * targetMin / 100} height="20" fill="#3a1515" />
          <rect x={10 + 180 * targetMax / 100} y="15" width={180 - 180 * targetMax / 100} height="20" fill="#3a1515" />
          {/* Target zone */}
          <rect x={10 + 180 * targetMin / 100} y="15" width={180 * (targetMax - targetMin) / 100} height="20" fill="#153a15" />
          <rect x={10 + 180 * targetMin / 100} y="15" width={180 * (targetMax - targetMin) / 100} height="20" fill="#5ae855" opacity="0.15" />
          {/* Target zone markers */}
          <rect x={10 + 180 * targetMin / 100 - 1} y="13" width="2" height="24" fill="#5ae855" opacity="0.5" />
          <rect x={10 + 180 * targetMax / 100 - 1} y="13" width="2" height="24" fill="#5ae855" opacity="0.5" />
          {/* Needle */}
          <rect x={10 + 180 * needlePos / 100 - 2} y="10" width="4" height="30" fill={
            needlePos >= targetMin && needlePos <= targetMax ? "#5ae855" : "#e85555"
          } />
          <rect x={10 + 180 * needlePos / 100 - 3} y="8" width="6" height="4" fill="#fff" />
          {/* Labels */}
          <text x={10 + 180 * ((targetMin + targetMax) / 2) / 100} y="43" textAnchor="middle" fontSize="4" fill="#5ae855" fontFamily="'Press Start 2P'">TARGET</text>
        </svg>
      </div>
      <div style={{ textAlign: "center" }}>
        {phase === "ready" && !result && (
          <PxButton variant="accent" onClick={startMoving} style={{ fontSize: "9px", padding: "10px 20px" }}>START CALIBRATION</PxButton>
        )}
        {phase === "moving" && !result && (
          <PxButton variant="primary" onClick={tryStop} style={{ fontSize: "9px", padding: "10px 20px", animation: "pulse 0.5s infinite" }}>⚡ STOP!</PxButton>
        )}
        {result === "success" && <div style={{ fontFamily: "'Press Start 2P'", fontSize: "11px", color: "#5ae855", animation: "pop 0.4s" }}>✓ CALIBRATED!</div>}
        {result === "fail" && <div style={{ fontFamily: "'Press Start 2P'", fontSize: "10px", color: "#e85555", animation: "shake 0.3s" }}>✗ MISSED! Off-target.</div>}
      </div>
    </PxPanel>
  );
}

// Repair minigame dispatcher
function RepairMinigame({ equipmentId, repairGame, onComplete, onFail }) {
  if (repairGame === "lens_align") return <LensAlignMinigame onComplete={onComplete} onFail={onFail} />;
  if (repairGame === "pipe_connect") return <PipeConnectMinigame onComplete={onComplete} onFail={onFail} />;
  if (repairGame === "calibrate") return <CalibrateMinigame onComplete={onComplete} onFail={onFail} />;
  // Fallback — auto-complete
  return <PxPanel title="REPAIRING..."><PxButton onClick={onComplete}>DONE</PxButton></PxPanel>;

function StainingMinigame({ level, staffSpeed, ownedReagents, onComplete, onFail }) {
  const [seq, setSeq] = useState([]);
  const [result, setResult] = useState(null);
  const maxT = Math.floor(60 + staffSpeed * 3);
  const [timer, setTimer] = useState(maxT);
  const [shaking, setShaking] = useState(false);

  useEffect(() => {
    if (result) return;
    if (timer <= 0) { setResult("fail"); setTimeout(onFail, 1500); return; }
    const t = setTimeout(() => setTimer(v => v - 1), 1000);
    return () => clearTimeout(t);
  }, [timer, result, onFail]);

  const add = (id) => {
    if (result) return;
    const next = [...seq, id];
    setSeq(next);
    if (!next.every((r, i) => r === level.correctSequence[i])) {
      setShaking(true); setTimeout(() => setShaking(false), 400);
      setResult("fail"); setTimeout(onFail, 1500); return;
    }
    if (next.length === level.correctSequence.length) { setResult("success"); setTimeout(onComplete, 5000); }
  };

  // Show ALL owned reagents as buttons — player must pick the right 4 in order
  const availableReagents = useMemo(() => {
    const owned = level.reagents.filter(r => ownedReagents.includes(r.id));
    const a = [...owned];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }, [level.reagents, ownedReagents]);

  const tc = timer > 8 ? "#5ae855" : timer > 4 ? "#e8a735" : "#e85555";

  return (
    <PxPanel title="🧫 APPLY REAGENTS IN ORDER" color="#0a0e1e">
      <div style={{ textAlign: "center", marginBottom: "8px" }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "10px", color: tc }}>⏱ {timer}s</span>
      </div>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: "10px", animation: shaking ? "shake 0.3s" : undefined }}>
        <div style={{ width: "200px", height: "50px", background: "#1a1a2e", border: "2px solid #3a4a6a", display: "flex", alignItems: "center", justifyContent: "center", gap: "3px" }}>
          {seq.map((rId, i) => {
            const r = level.reagents.find(x => x.id === rId);
            return <div key={i} style={{ width: "22px", height: "34px", background: r?.color, border: "2px solid #fff2", animation: "pop 0.3s" }} />;
          })}
          {seq.length === 0 && <span style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#3a4a6a" }}>[ SLIDE ]</span>}
        </div>
      </div>
      <div style={{ textAlign: "center", marginBottom: "8px" }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "7px", color: "#5a7a9a" }}>STEP {Math.min(seq.length + 1, level.correctSequence.length)} / {level.correctSequence.length}</span>
      </div>
      {!result && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", justifyContent: "center", maxHeight: "100px", overflow: "auto" }}>
          {availableReagents.map(r => (
            <PxButton key={r.id} variant="accent" disabled={seq.includes(r.id)} onClick={() => add(r.id)}
              style={{ minWidth: "80px", fontSize: "6px", padding: "6px 8px", display: "flex", alignItems: "center", gap: "3px" }}>
              <span style={{ display: "inline-block", width: "6px", height: "6px", background: r.color, border: "1px solid #fff3", flexShrink: 0 }} />
              {r.name.length > 12 ? r.name.split(" ")[0] : r.name}
            </PxButton>
          ))}
        </div>
      )}
      {result === "success" && (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontFamily: "'Press Start 2P'", fontSize: "11px", color: "#5ae855", animation: "pop 0.4s" }}>✓ COMPLETE!</div>
          <div style={{ marginTop: "6px", display: "flex", justifyContent: "center", gap: "12px", alignItems: "center" }}>
            <svg viewBox="0 0 24 24" width="28" height="28" style={{ imageRendering: "pixelated" }}>
              <circle cx="12" cy="12" r="10" fill="#5B2C8E" />
              <circle cx="9" cy="9" r="3.5" fill="#7B4CB0" opacity="0.4" />
            </svg>
            <span style={{ fontFamily: "'Press Start 2P'", fontSize: "5px", color: "#8ec8f0" }}>GRAM+<br/>PURPLE</span>
            <svg viewBox="0 0 30 18" width="38" height="22" style={{ imageRendering: "pixelated" }}>
              <rect x="2" y="2" width="26" height="14" rx="5" fill="#E8A0A0" />
              <rect x="5" y="4" width="6" height="3" fill="#F0C0C0" opacity="0.4" />
            </svg>
            <span style={{ fontFamily: "'Press Start 2P'", fontSize: "5px", color: "#8ec8f0" }}>GRAM-<br/>PINK</span>
          </div>
        </div>
      )}
      {result === "fail" && <div style={{ textAlign: "center", fontFamily: "'Press Start 2P'", fontSize: "10px", color: "#e85555", animation: "shake 0.3s" }}>✗ WRONG ORDER!</div>}
    </PxPanel>
  );
}

// SECTION 6: MAIN LAB CONTROLLER

function LabScreen({ level, onComplete, onGameOver }) {
  const [money, setMoney] = useState(3500);
  const [ownedEquipment, setOwnedEquipment] = useState([]);
  const [brokenEquipment, setBrokenEquipment] = useState(level.requiredEquipment.filter(e => e.broken).map(e => e.id));
  const [ownedReagents, setOwnedReagents] = useState([]);
  const [staff, setStaff] = useState([]);
  const [cycle, setCycle] = useState(0);
  const [activePanel, setActivePanel] = useState(null);
  const [repairingEquip, setRepairingEquip] = useState(null); // equipment object being repaired
  const [log, setLog] = useState(["Welcome to your new lab, PI."]);
  const [experimentAttempts, setExperimentAttempts] = useState(0);

  const totalWage = staff.reduce((s, h) => s + STAFF_TYPES.find(t => t.id === h.id).wage, 0);
  const totalSpeed = staff.reduce((s, h) => s + STAFF_TYPES.find(t => t.id === h.id).speed, 0);

  useEffect(() => { const i = setInterval(() => setCycle(c => c + 1), 8000); return () => clearInterval(i); }, []);
  useEffect(() => {
    if (cycle === 0 || totalWage === 0) return;
    setMoney(m => { const n = m - totalWage; if (n <= 0) { onGameOver("Grant ran out! Wages exceeded funds."); return 0; } return n; });
    addLog(`Cycle ${cycle}: -$${totalWage} wages`);
  }, [cycle]);

  const addLog = (msg) => setLog(p => [msg, ...p].slice(0, 20));
  const buyEquipment = (eq) => { setMoney(m => m - eq.cost); setOwnedEquipment(p => [...p, eq.id]); addLog(`Bought ${eq.name}`); };
  // Repair now opens minigame — pay cost upfront
  const startRepair = (eq) => {
    setRepairingEquip(eq);
    setActivePanel("repair");
    addLog(`Repairing ${eq.name}...`);
  };
  const handleRepairSuccess = () => {
    if (repairingEquip) {
      setBrokenEquipment(p => p.filter(id => id !== repairingEquip.id));
      addLog(`✓ ${repairingEquip.name} repaired!`);
    }
    setRepairingEquip(null);
    setActivePanel(null);
  };
  const handleRepairFail = () => {
    if (repairingEquip) {
      addLog(`✗ ${repairingEquip.name} repair failed. Try again.`);
    }
    setRepairingEquip(null);
    setActivePanel(null);
  };
  const buyReagent = (r) => { setMoney(m => m - r.cost); setOwnedReagents(p => [...p, r.id]); addLog(`Bought ${r.name}`); };
  const hireStaff = (s) => { setMoney(m => m - s.cost); setStaff(p => [...p, { id: s.id, uid: Date.now() }]); addLog(`Hired ${s.name}`); };
  const fireStaff = (id) => { setStaff(p => { const i = p.findIndex(s => s.id === id); if (i === -1) return p; const c = [...p]; c.splice(i, 1); return c; }); addLog(`Fired ${STAFF_TYPES.find(s => s.id === id).name}`); };

  const allEquipReady = level.requiredEquipment.every(eq => ownedEquipment.includes(eq.id) && !brokenEquipment.includes(eq.id));
  const allReagentsReady = level.requiredReagents.every(rId => ownedReagents.includes(rId));
  const hasStaff = staff.length > 0;
  const canExperiment = allEquipReady && allReagentsReady && hasStaff;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>
      {/* HUD */}
      <div style={{ background: "#0a1020", borderBottom: "2px solid #3a4a6a", padding: "5px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div>
          <span style={{ fontFamily: "'Press Start 2P'", fontSize: "8px", color: "#e8a735" }}>💰${money.toLocaleString()}</span>
          <span style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#e85555", marginLeft: "8px" }}>-${totalWage}/cyc</span>
        </div>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#5a7a9a" }}>👥{staff.length} CYC:{cycle}</span>
      </div>

      {/* Controls */}
      <div style={{ flex: 1, overflow: "auto", padding: "6px", display: "flex", flexDirection: "column", gap: "5px" }}>
        <ResourceBar label="GRANT" current={money} max={3500} color="#e8a735" icon="💰" />
        {activePanel === null && (
          <>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "4px", justifyContent: "center", padding: "3px 0" }}>
              <PxButton variant="shop" onClick={() => setActivePanel("equip")}>⚙ EQUIP</PxButton>
              <PxButton variant="accent" onClick={() => setActivePanel("reagent")}>🧪 REAGENTS</PxButton>
              <PxButton variant="primary" onClick={() => setActivePanel("hire")}>👥 HIRE</PxButton>
              <PxButton variant={canExperiment ? "primary" : "neutral"} disabled={!canExperiment} onClick={() => setActivePanel("experiment")}
                style={canExperiment ? { animation: "pulse 1.5s infinite", border: "2px solid #5ae855" } : {}}>🧫 EXPERIMENT</PxButton>
            </div>
            <PxPanel title={`📋 ${level.name.toUpperCase()}`} color="#0f1a2e">
              <div style={{ fontFamily: "'Press Start 2P'", fontSize: "7px", lineHeight: "2" }}>
                <div style={{ color: allEquipReady ? "#5ae855" : "#e85555" }}>{allEquipReady ? "✓" : "✗"} Equipment</div>
                <div style={{ color: allReagentsReady ? "#5ae855" : "#e85555" }}>{allReagentsReady ? "✓" : "✗"} Reagents ({level.requiredReagents.filter(rId => ownedReagents.includes(rId)).length}/4 correct)</div>
                <div style={{ color: hasStaff ? "#5ae855" : "#e85555" }}>{hasStaff ? "✓" : "✗"} Staff (spd:{totalSpeed.toFixed(1)})</div>
                {canExperiment && <div style={{ color: "#5ae855", marginTop: "3px" }}>► READY</div>}
                {experimentAttempts > 0 && <div style={{ color: "#e8a735" }}>Failed: {experimentAttempts}x</div>}
              </div>
            </PxPanel>
          </>
        )}
        {activePanel === "equip" && <EquipmentShop level={level} ownedEquipment={ownedEquipment} brokenEquipment={brokenEquipment} money={money} onBuy={buyEquipment} onRepair={startRepair} onClose={() => setActivePanel(null)} />}
        {activePanel === "repair" && repairingEquip && (
          <RepairMinigame equipmentId={repairingEquip.id} repairGame={repairingEquip.repairGame} onComplete={handleRepairSuccess} onFail={handleRepairFail} />
        )}
        {activePanel === "reagent" && <ReagentShop level={level} ownedReagents={ownedReagents} money={money} onBuy={buyReagent} onClose={() => setActivePanel(null)} />}
        {activePanel === "hire" && <HiringPanel staff={staff} money={money} onHire={hireStaff} onFire={fireStaff} onClose={() => setActivePanel(null)} />}
        {activePanel === "experiment" && <StainingMinigame level={level} staffSpeed={totalSpeed} ownedReagents={ownedReagents} onComplete={() => { setMoney(m => m + level.grantReward); addLog("SUCCESS!"); onComplete(money + level.grantReward); }} onFail={() => { setExperimentAttempts(a => a + 1); setOwnedReagents(prev => prev.filter(id => !level.requiredReagents.includes(id))); addLog("Failed — correct reagents consumed."); setActivePanel(null); }} />}

        <PxPanel title="📜 LOG" color="#080e1a" style={{ flexShrink: 0 }}>
          <div style={{ maxHeight: "40px", overflow: "auto" }}>
            {log.slice(0, 4).map((e, i) => <div key={i} style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: i === 0 ? "#8ec8f0" : "#3a5a6a", lineHeight: "1.5" }}>&gt; {e}</div>)}
          </div>
        </PxPanel>
      </div>

      {/* ═══ LAB VISUALIZATION ═══ */}
      <LabScene ownedEquipment={ownedEquipment} brokenEquipment={brokenEquipment} ownedReagents={ownedReagents} staff={staff} level={level} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SECTION 7: APP ROOT
// ═══════════════════════════════════════════════════════════════

function BioLabQuest() {
  const [screen, setScreen] = useState("title");
  const [lvlIdx, setLvlIdx] = useState(0);
  const [finalMoney, setFinalMoney] = useState(0);
  const [goReason, setGoReason] = useState("");
  const level = LEVELS[lvlIdx];

  return (
    <div style={{
      width: "100%", maxWidth: "480px", height: "100vh", maxHeight: "780px",
      margin: "0 auto", background: level?.background || "#0a1628",
      position: "relative", overflow: "hidden",
      boxShadow: "0 0 40px rgba(123,47,247,0.15), 0 0 80px rgba(0,0,0,0.4)",
      display: "flex", flexDirection: "column",
    }}>
      <Scanlines />
      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
        @keyframes pop{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:#0a1020}
        ::-webkit-scrollbar-thumb{background:#3a4a6a}
      `}</style>
      <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
        {screen === "title" && <TitleScreen onStart={() => setScreen("briefing")} />}
        {screen === "briefing" && <BriefingScreen level={level} onContinue={() => setScreen("lab")} />}
        {screen === "lab" && <LabScreen level={level} onComplete={m => { setFinalMoney(m); setScreen("complete"); }} onGameOver={r => { setGoReason(r); setScreen("gameover"); }} />}
        {screen === "complete" && <CompletionScreen level={level} finalMoney={finalMoney} onNext={() => { if (lvlIdx + 1 < LEVELS.length) { setLvlIdx(i => i + 1); setScreen("briefing"); } else { setLvlIdx(0); setScreen("title"); } }} />}
        {screen === "gameover" && <GameOverScreen reason={goReason} onRetry={() => setScreen("briefing")} />}
      </div>
      <div style={{ background: "#060c18", borderTop: "2px solid #2a3a5a", padding: "3px 10px", display: "flex", justifyContent: "space-between", flexShrink: 0 }}>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#2a3a5a" }}>BIOLAB QUEST v1.0</span>
        <span style={{ fontFamily: "'Press Start 2P'", fontSize: "6px", color: "#2a3a5a" }}>LVL {level?.id || 1}</span>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(BioLabQuest));
  </script>
</body>
</html>
